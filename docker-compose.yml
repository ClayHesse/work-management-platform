services:
  postgres:
    image: postgres:18
    container_name: wmp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - wmp_postgres_data:/var/lib/postgresql

volumes:
  wmp_postgres_data: